name: DX maintain

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Dex maintenance mode
        required: false
        default: report
        type: choice
        options:
          - report
          - propose
          - fix-scoped
      since:
        description: Git ref or date used to bound recent-history scanning
        required: false
        default: ""
  schedule:
    - cron: "17 2 * * *"
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions: {}

env:
  DEX_REPO: __DEX_REPO__
  DEX_REF: __DEX_REF__

jobs:
  nightly:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: read
      issues: read
      actions: read
    concurrency:
      group: dx-maintain-${{ github.repository }}-nightly
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.mode != 'report' && github.event.repository.default_branch || github.ref }}
          persist-credentials: false

      - name: Bootstrap Dex
        shell: bash
        run: |
          set -euo pipefail
          git init "$RUNNER_TEMP/dex"
          git -C "$RUNNER_TEMP/dex" remote add origin "https://github.com/${DEX_REPO}.git"
          git -C "$RUNNER_TEMP/dex" fetch --depth 1 origin "$DEX_REF"
          git -C "$RUNNER_TEMP/dex" checkout --detach FETCH_HEAD
          {
            echo "DEX_DIR=$RUNNER_TEMP/dex"
            echo "DX_ARTIFACT_DIR=$RUNNER_TEMP/dex-artifacts"
            echo "DX_MAINTAIN_PUBLISH_STATE=$RUNNER_TEMP/dex-artifacts/maintenance/publish-state.tsv"
          } >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/dex-artifacts"
          chmod +x "$RUNNER_TEMP/dex/bin/"*.sh "$RUNNER_TEMP/dex/hooks/"*.sh "$RUNNER_TEMP/dex/hooks/"*.py

      - name: Configure agent provider
        id: provider
        shell: bash
        env:
          DX_MAINTAIN_PROVIDER_SETUP: ${{ secrets.DX_MAINTAIN_PROVIDER_SETUP }}
        run: |
          set -euo pipefail
          if command -v claude >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${DX_MAINTAIN_PROVIDER_SETUP:-}" ]]; then
            report_dir="${DX_ARTIFACT_DIR}/maintenance/provider-setup-${GITHUB_RUN_ID}"
            mkdir -p "$report_dir"
            cat > "$report_dir/report.md" <<EOF
          # Dex Maintenance Report

          Run: provider-setup-${GITHUB_RUN_ID}
          Status: skipped

          DX maintain did not run because the Claude Code CLI is not available
          and the DX_MAINTAIN_PROVIDER_SETUP secret is not configured.
          EOF
            echo "::notice::Claude Code CLI is not available. Add a DX_MAINTAIN_PROVIDER_SETUP secret that installs/authenticates the agent provider, or run on a runner where claude is already configured."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$DX_MAINTAIN_PROVIDER_SETUP" | bash -s
          if ! command -v claude >/dev/null 2>&1; then
            echo "::error::DX_MAINTAIN_PROVIDER_SETUP completed, but Claude Code CLI is still not available on PATH."
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Verify agent provider
        if: ${{ steps.provider.outputs.ready == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v claude >/dev/null 2>&1; then
            echo "::error::Claude Code CLI is not available on this runner. Add a provider setup step before running DX maintain."
            exit 1
          fi

      - name: Record report-mode sync deferral
        if: ${{ steps.provider.outputs.ready == 'true' }}
        shell: bash
        env:
          MODE: ${{ inputs.mode || 'report' }}
        run: |
          set -euo pipefail
          if [[ "$MODE" != "report" ]]; then
            exit 0
          fi
          report_dir="${DX_ARTIFACT_DIR}/maintenance/pre-sync-${GITHUB_RUN_ID}"
          mkdir -p "$report_dir"
          {
            echo "# Dex Maintenance Report"
            echo ""
            echo "Run: pre-sync-${GITHUB_RUN_ID}"
            echo "Status: deferred"
            echo ""
            echo "DX sync is deferred to the guarded DX maintain dry-run in report mode."
          } > "$report_dir/report.md"

      - name: Run DX maintain
        if: ${{ steps.provider.outputs.ready == 'true' }}
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          MODE: ${{ inputs.mode || 'report' }}
          SINCE: ${{ inputs.since || '' }}
        run: |
          set -euo pipefail
          if [[ "$MODE" != "report" ]]; then
            git config user.name "dex-maintain[bot]"
            git config user.email "dex-maintain[bot]@users.noreply.github.com"
          fi
          unset GH_TOKEN GITHUB_TOKEN DX_MAINTAIN_TOKEN
          unset GITHUB_ENV GITHUB_PATH GITHUB_OUTPUT GITHUB_STEP_SUMMARY GITHUB_STATE
          unset ACTIONS_RUNTIME_TOKEN ACTIONS_ID_TOKEN_REQUEST_TOKEN ACTIONS_ID_TOKEN_REQUEST_URL
          MAINTAIN_ARGS=(--nightly --mode "$MODE" --budget-minutes 100 --command-timeout-seconds 30)
          if [[ -n "$SINCE" ]]; then
            MAINTAIN_ARGS+=(--since "$SINCE")
          fi
          if [[ "$MODE" != "report" ]]; then
            MAINTAIN_ARGS+=(--defer-publish "$DX_MAINTAIN_PUBLISH_STATE")
          fi
          bash "$DEX_DIR/bin/maintain.sh" "${MAINTAIN_ARGS[@]}"

      - name: Upload maintenance artifacts
        if: always()
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dx-maintain-${{ github.run_id }}
          path: ${{ runner.temp }}/dex-artifacts/maintenance/
          if-no-files-found: ignore

  publish:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode != 'report' }}
    needs: nightly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    concurrency:
      group: dx-maintain-${{ github.repository }}-nightly
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Bootstrap Dex
        shell: bash
        run: |
          set -euo pipefail
          git init "$RUNNER_TEMP/dex-publish"
          git -C "$RUNNER_TEMP/dex-publish" remote add origin "https://github.com/${DEX_REPO}.git"
          git -C "$RUNNER_TEMP/dex-publish" fetch --depth 1 origin "$DEX_REF"
          git -C "$RUNNER_TEMP/dex-publish" checkout --detach FETCH_HEAD
          {
            echo "DEX_DIR=$RUNNER_TEMP/dex-publish"
            echo "DX_ARTIFACT_DIR=$RUNNER_TEMP/dex-artifacts"
          } >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/dex-artifacts"
          chmod +x "$RUNNER_TEMP/dex-publish/bin/"*.sh "$RUNNER_TEMP/dex-publish/hooks/"*.sh "$RUNNER_TEMP/dex-publish/hooks/"*.py

      - name: Download maintenance artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DX_MAINTAIN_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Write-capable DX maintain modes require the DX_MAINTAIN_TOKEN secret."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/dx-maintain-artifacts"
          gh run download "$GITHUB_RUN_ID" --repo "$GH_REPO" --name "dx-maintain-${GITHUB_RUN_ID}" --dir "$RUNNER_TEMP/dx-maintain-artifacts"

      - name: Publish deferred maintenance PR
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          DX_MAINTAIN_TOKEN: ${{ secrets.DX_MAINTAIN_TOKEN }}
        run: |
          set -euo pipefail
          maintain_config() {
            local key="$1" default_value="$2" value=""
            if [[ -f ".dex/dex.md" ]]; then
              value=$(awk -F'|' -v want="$key" '
                /^## Maintenance[[:space:]]*$/ { in_section = 1; next }
                in_section && /^## / { exit }
                in_section && /^\|/ {
                  k = $2
                  v = $3
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", k)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                  if (k == want) { print v; exit }
                }
              ' .dex/dex.md 2>/dev/null || true)
            fi
            printf '%s\n' "${value:-$default_value}"
          }
          state_count=$(find "$RUNNER_TEMP/dx-maintain-artifacts" -name publish-state.tsv -type f | wc -l | tr -d ' ')
          state_file="$RUNNER_TEMP/dx-maintain-artifacts/publish-state.tsv"
          if [[ "$state_count" == "0" ]]; then
            echo "::notice::No deferred maintenance PR publication state was produced."
            exit 0
          fi
          if [[ "$state_count" != "1" || ! -f "$state_file" ]]; then
            echo "::error::Unexpected deferred maintenance PR state artifact layout."
            find "$RUNNER_TEMP/dx-maintain-artifacts" -name publish-state.tsv -type f -print
            exit 1
          fi
          export DX_MAINTAIN_LABEL
          export DX_MAINTAIN_ALLOWED_CATEGORIES
          export DX_MAINTAIN_COPILOT_REVIEW
          export DX_MAINTAIN_TRUSTED_CONFIG_REF
          export DX_MAINTAIN_REVIEWERS
          DX_MAINTAIN_LABEL=$(maintain_config label dex-maintenance)
          DX_MAINTAIN_ALLOWED_CATEGORIES=$(maintain_config low_risk_fix_categories "docs, rules, guards, memory, tests")
          DX_MAINTAIN_COPILOT_REVIEW=$(maintain_config copilot_review true)
          DX_MAINTAIN_TRUSTED_CONFIG_REF=$(git rev-parse HEAD)
          DX_MAINTAIN_REVIEWERS=$(awk -F'|' '
            /^## Reviewers[[:space:]]*$/ { in_section = 1; next }
            in_section && /^## / { exit }
            in_section && /^\|/ {
              handle = $2
              type = $3
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", handle)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", type)
              if (handle && handle != "Handle" && handle !~ /^-+$/ && handle != "_none_" && type == "request") {
                print handle
              }
            }
          ' .dex/dex.md 2>/dev/null | paste -sd, - || true)
          bash "$DEX_DIR/bin/maintain.sh" publish --state-file "$state_file"

  respond:
    if: ${{ (github.event_name == 'issue_comment' && github.event.issue.pull_request) || github.event_name == 'pull_request_review' || github.event_name == 'pull_request_review_comment' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: read
      issues: read
      actions: read
    outputs:
      proceed: ${{ steps.preflight.outputs.proceed }}
      head_ref: ${{ steps.preflight.outputs.head_ref }}
      head_sha: ${{ steps.preflight.outputs.head_sha }}
      label: ${{ steps.preflight.outputs.label }}
      branch_prefix: ${{ steps.preflight.outputs.branch_prefix }}
      allowed_categories: ${{ steps.preflight.outputs.allowed_categories }}
      copilot_review: ${{ steps.preflight.outputs.copilot_review }}
      trusted_config_ref: ${{ steps.preflight.outputs.trusted_config_ref }}
      reviewers: ${{ steps.preflight.outputs.reviewers }}
    concurrency:
      group: dx-maintain-${{ github.repository }}-pr-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository metadata
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Preflight maintenance PR
        id: preflight
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DX_MAINTAIN_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          set -euo pipefail
          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }
          maintain_config() {
            local key="$1" default_value="$2" value=""
            if [[ -f ".dex/dex.md" ]]; then
              value=$(awk -F'|' -v want="$key" '
                /^## Maintenance[[:space:]]*$/ { in_section = 1; next }
                in_section && /^## / { exit }
                in_section && /^\|/ {
                  k = $2
                  v = $3
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", k)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                  if (k == want) { print v; exit }
                }
              ' .dex/dex.md 2>/dev/null || true)
            fi
            printf '%s\n' "${value:-$default_value}"
          }
          DX_MAINTAIN_LABEL=$(maintain_config label dex-maintenance)
          DX_MAINTAIN_BRANCH_PREFIX=$(maintain_config branch_prefix dex/maintain/)
          DX_MAINTAIN_ENABLED=$(maintain_config enabled true)
          DX_MAINTAIN_ALLOWED_CATEGORIES=$(maintain_config low_risk_fix_categories "docs, rules, guards, memory, tests")
          DX_MAINTAIN_COPILOT_REVIEW=$(maintain_config copilot_review true)
          DX_MAINTAIN_TRUSTED_CONFIG_REF=$(git rev-parse HEAD)
          DX_MAINTAIN_REVIEWERS=$(awk -F'|' '
            /^## Reviewers[[:space:]]*$/ { in_section = 1; next }
            in_section && /^## / { exit }
            in_section && /^\|/ {
              handle = $2
              type = $3
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", handle)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", type)
              if (handle && handle != "Handle" && handle !~ /^-+$/ && handle != "_none_" && type == "request") {
                print handle
              }
            }
          ' .dex/dex.md 2>/dev/null | paste -sd, - || true)
          case "$(printf '%s' "$DX_MAINTAIN_ENABLED" | tr '[:upper:]' '[:lower:]')" in
            false|no|0|disabled)
              set_output proceed false
              echo "::notice::Skipping DX maintain response: maintenance is disabled in .dex/dex.md."
              exit 0
              ;;
          esac
          if [[ -z "${GH_TOKEN:-}" ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response: DX_MAINTAIN_TOKEN is required for write-capable response runs."
            exit 0
          fi
          if [[ -z "${PR_NUM:-}" ]]; then
            set_output proceed false
            echo "::notice::No PR number found for this event."
            exit 0
          fi

          association=$(python3 - "$GITHUB_EVENT_PATH" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as f:
              event = json.load(f)
          login = (
              event.get("comment", {}).get("user", {}).get("login")
              or event.get("review", {}).get("user", {}).get("login")
              or event.get("sender", {}).get("login")
              or ""
          )
          association = (
              event.get("comment", {}).get("author_association")
              or event.get("review", {}).get("author_association")
              or "unknown"
          )
          print(f"{login}\t{association}")
          PY
          )
          actor="${association%%$'\t'*}"
          actor_association="${association#*$'\t'}"
          body=$(python3 - "$GITHUB_EVENT_PATH" <<'PY'
          import json
          import sys
          with open(sys.argv[1], "r", encoding="utf-8") as f:
              event = json.load(f)
          print(event.get("comment", {}).get("body") or event.get("review", {}).get("body") or "")
          PY
          )
          review_state=$(python3 - "$GITHUB_EVENT_PATH" <<'PY'
          import json
          import sys
          with open(sys.argv[1], "r", encoding="utf-8") as f:
              event = json.load(f)
          print(event.get("review", {}).get("state") or "")
          PY
          )
          if [[ "$body" == *"dx-maintain-response"* ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response: event was created by DX maintain."
            exit 0
          fi
          if [[ -z "$actor" ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response: event actor could not be determined."
            exit 0
          fi
          if [[ "$actor" == "github-actions[bot]" || "$actor" == "dependabot[bot]" ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response for bot actor: $actor."
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "issue_comment" && "$actor" == *"[bot]" ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response for PR-level bot comment: $actor."
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "issue_comment" && "$body" != *"@dex"* && "$body" != *"dx maintain"* && "$body" != *"DX maintain"* ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response: PR-level comments require @dex or dx maintain."
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "pull_request_review" && "$review_state" != "changes_requested" && "$body" != *"@dex"* && "$body" != *"dx maintain"* && "$body" != *"DX maintain"* ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response: submitted reviews require changes_requested, @dex, or dx maintain."
            exit 0
          fi
          permission=$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${actor}/permission" --jq .permission 2>/dev/null || echo "")
          case "$permission" in
            admin|maintain|write) ;;
            *)
              set_output proceed false
              echo "::notice::Skipping DX maintain response: ${actor} has ${permission:-unknown} permission on ${GITHUB_REPOSITORY}; write, maintain, or admin is required. Event association: ${actor_association}."
              exit 0
              ;;
          esac

          set +e
          pr_json=$(gh pr view "$PR_NUM" --repo "$GH_REPO" --json labels,headRefName,headRefOid,isCrossRepository,body)
          pr_status=$?
          set -e
          if [[ "$pr_status" -ne 0 ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response: could not read PR #${PR_NUM} in ${GH_REPO}."
            exit 0
          fi
          set +e
          python3 - "$DX_MAINTAIN_LABEL" "$DX_MAINTAIN_BRANCH_PREFIX" "$pr_json" <<'PY'
          import json
          import sys

          label = sys.argv[1]
          prefix = sys.argv[2]
          data = json.loads(sys.argv[3])
          labels = {item.get("name", "") for item in data.get("labels", [])}
          head = data.get("headRefName") or ""
          body = data.get("body") or ""
          eligible = label in labels and bool(prefix and head.startswith(prefix))

          if not eligible:
              print("skip:not a Dex maintenance PR; label and branch prefix are required")
              sys.exit(1)
          if data.get("isCrossRepository"):
              print("skip:cross-repository PR heads are not trusted for autonomous response")
              sys.exit(1)
          if not data.get("headRefOid"):
              print("skip:PR head SHA could not be determined")
              sys.exit(1)
          run_id = head[len(prefix):] if prefix and head.startswith(prefix) else ""
          if not run_id.startswith("maintain-") or not all(ch.isalnum() or ch in "._-" for ch in run_id):
              print("skip:maintenance PR branch suffix is not a safe Dex run id")
              sys.exit(1)
          if not run_id or run_id not in body or f"dx-maintain-run:{run_id}" not in body:
              print("skip:PR body is missing the Dex maintenance provenance marker for this branch")
              sys.exit(1)
          print(f"proceed:eligible maintenance PR head={head or 'unknown'} oid={data.get('headRefOid')}")
          PY
          preflight_status=$?
          set -e
          if [[ "$preflight_status" -ne 0 ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response: PR is not eligible."
            exit 0
          fi
          head_ref=$(python3 - "$pr_json" <<'PY'
          import json
          import sys
          data = json.loads(sys.argv[1])
          print(data.get("headRefName") or "")
          PY
          )
          head_sha=$(python3 - "$pr_json" <<'PY'
          import json
          import sys
          data = json.loads(sys.argv[1])
          print(data.get("headRefOid") or "")
          PY
          )
          if [[ -z "$head_ref" ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response: PR head branch could not be determined."
            exit 0
          fi
          if [[ -z "$head_sha" ]]; then
            set_output proceed false
            echo "::notice::Skipping DX maintain response: PR head SHA could not be determined."
            exit 0
          fi
          set_output proceed true
          set_output head_ref "$head_ref"
          set_output head_sha "$head_sha"
          set_output label "$DX_MAINTAIN_LABEL"
          set_output branch_prefix "$DX_MAINTAIN_BRANCH_PREFIX"
          set_output enabled "$DX_MAINTAIN_ENABLED"
          set_output allowed_categories "$DX_MAINTAIN_ALLOWED_CATEGORIES"
          set_output copilot_review "$DX_MAINTAIN_COPILOT_REVIEW"
          set_output trusted_config_ref "$DX_MAINTAIN_TRUSTED_CONFIG_REF"
          set_output reviewers "$DX_MAINTAIN_REVIEWERS"
          context_dir="$RUNNER_TEMP/dx-maintain-response-preflight"
          mkdir -p "$context_dir"
          gh pr view "$PR_NUM" --repo "$GH_REPO" --json number,title,body,labels,headRefName,headRefOid,files,comments,reviews > "$context_dir/pr-${PR_NUM}-context.json"
          gh api --paginate --slurp "repos/${GH_REPO}/pulls/${PR_NUM}/comments" > "$context_dir/pr-${PR_NUM}-inline-comments.json"
          set_output context_dir "$context_dir"

      - name: Checkout repository
        if: ${{ steps.preflight.outputs.proceed == 'true' }}
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ steps.preflight.outputs.head_sha }}
          persist-credentials: false

      - name: Bootstrap Dex
        if: ${{ steps.preflight.outputs.proceed == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git init "$RUNNER_TEMP/dex"
          git -C "$RUNNER_TEMP/dex" remote add origin "https://github.com/${DEX_REPO}.git"
          git -C "$RUNNER_TEMP/dex" fetch --depth 1 origin "$DEX_REF"
          git -C "$RUNNER_TEMP/dex" checkout --detach FETCH_HEAD
          {
            echo "DEX_DIR=$RUNNER_TEMP/dex"
            echo "DX_ARTIFACT_DIR=$RUNNER_TEMP/dex-artifacts"
            echo "DX_MAINTAIN_RESPONSE_STATE=$RUNNER_TEMP/dex-artifacts/maintenance/response-state.tsv"
          } >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/dex-artifacts"
          chmod +x "$RUNNER_TEMP/dex/bin/"*.sh "$RUNNER_TEMP/dex/hooks/"*.sh "$RUNNER_TEMP/dex/hooks/"*.py

      - name: Configure agent provider
        if: ${{ steps.preflight.outputs.proceed == 'true' }}
        id: provider
        shell: bash
        env:
          DX_MAINTAIN_PROVIDER_SETUP: ${{ secrets.DX_MAINTAIN_PROVIDER_SETUP }}
        run: |
          set -euo pipefail
          if command -v claude >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${DX_MAINTAIN_PROVIDER_SETUP:-}" ]]; then
            report_dir="${DX_ARTIFACT_DIR}/maintenance/provider-setup-${GITHUB_RUN_ID}"
            mkdir -p "$report_dir"
            cat > "$report_dir/report.md" <<EOF
          # Dex Maintenance Report

          Run: provider-setup-${GITHUB_RUN_ID}
          Status: skipped

          DX maintain did not run because the Claude Code CLI is not available
          and the DX_MAINTAIN_PROVIDER_SETUP secret is not configured.
          EOF
            echo "::notice::Claude Code CLI is not available. Add a DX_MAINTAIN_PROVIDER_SETUP secret that installs/authenticates the agent provider, or run on a runner where claude is already configured."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$DX_MAINTAIN_PROVIDER_SETUP" | bash -s
          if ! command -v claude >/dev/null 2>&1; then
            echo "::error::DX_MAINTAIN_PROVIDER_SETUP completed, but Claude Code CLI is still not available on PATH."
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Verify agent provider
        if: ${{ steps.preflight.outputs.proceed == 'true' && steps.provider.outputs.ready == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v claude >/dev/null 2>&1; then
            echo "::error::Claude Code CLI is not available on this runner. Add a provider setup step before running DX maintain."
            exit 1
          fi

      - name: Respond to maintenance PR feedback
        if: ${{ steps.preflight.outputs.proceed == 'true' && steps.provider.outputs.ready == 'true' }}
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          DX_MAINTAIN_ENABLED: ${{ steps.preflight.outputs.enabled }}
          DX_MAINTAIN_LABEL: ${{ steps.preflight.outputs.label }}
          DX_MAINTAIN_BRANCH_PREFIX: ${{ steps.preflight.outputs.branch_prefix }}
          DX_MAINTAIN_ALLOWED_CATEGORIES: ${{ steps.preflight.outputs.allowed_categories }}
          DX_MAINTAIN_COPILOT_REVIEW: ${{ steps.preflight.outputs.copilot_review }}
          DX_MAINTAIN_TRUSTED_CONFIG_REF: ${{ steps.preflight.outputs.trusted_config_ref }}
          DX_MAINTAIN_REVIEWERS: ${{ steps.preflight.outputs.reviewers }}
          HEAD_REF: ${{ steps.preflight.outputs.head_ref }}
          HEAD_SHA: ${{ steps.preflight.outputs.head_sha }}
          CONTEXT_DIR: ${{ steps.preflight.outputs.context_dir }}
          PR_NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
          EVENT_KIND: ${{ github.event_name }}
        run: |
          set -euo pipefail
          unset GH_TOKEN GITHUB_TOKEN DX_MAINTAIN_TOKEN
          unset GITHUB_ENV GITHUB_PATH GITHUB_OUTPUT GITHUB_STEP_SUMMARY GITHUB_STATE
          unset ACTIONS_RUNTIME_TOKEN ACTIONS_ID_TOKEN_REQUEST_TOKEN ACTIONS_ID_TOKEN_REQUEST_URL
          git config user.name "dex-maintain[bot]"
          git config user.email "dex-maintain[bot]@users.noreply.github.com"
          git checkout -B "$HEAD_REF" "$HEAD_SHA"
          bash "$DEX_DIR/bin/maintain.sh" respond \
            --pr "$PR_NUM" \
            --event "$EVENT_KIND" \
            --trusted-preflight \
            --context-dir "$CONTEXT_DIR" \
            --expected-branch "$HEAD_REF" \
            --expected-head-sha "$HEAD_SHA" \
            --defer-publish "$DX_MAINTAIN_RESPONSE_STATE"

      - name: Upload maintenance response artifacts
        if: always()
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dx-maintain-response-${{ github.run_id }}
          path: ${{ runner.temp }}/dex-artifacts/maintenance/
          if-no-files-found: ignore

  publish-response:
    if: ${{ needs.respond.outputs.proceed == 'true' }}
    needs: respond
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    concurrency:
      group: dx-maintain-${{ github.repository }}-pr-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout PR head
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ needs.respond.outputs.head_sha }}
          persist-credentials: false

      - name: Bootstrap Dex
        shell: bash
        run: |
          set -euo pipefail
          git init "$RUNNER_TEMP/dex-publish-response"
          git -C "$RUNNER_TEMP/dex-publish-response" remote add origin "https://github.com/${DEX_REPO}.git"
          git -C "$RUNNER_TEMP/dex-publish-response" fetch --depth 1 origin "$DEX_REF"
          git -C "$RUNNER_TEMP/dex-publish-response" checkout --detach FETCH_HEAD
          {
            echo "DEX_DIR=$RUNNER_TEMP/dex-publish-response"
            echo "DX_ARTIFACT_DIR=$RUNNER_TEMP/dex-artifacts"
          } >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/dex-artifacts"
          chmod +x "$RUNNER_TEMP/dex-publish-response/bin/"*.sh "$RUNNER_TEMP/dex-publish-response/hooks/"*.sh "$RUNNER_TEMP/dex-publish-response/hooks/"*.py

      - name: Download maintenance response artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DX_MAINTAIN_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::DX_MAINTAIN_TOKEN is required for write-capable response publication."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/dx-maintain-response-artifacts"
          gh run download "$GITHUB_RUN_ID" --repo "$GH_REPO" --name "dx-maintain-response-${GITHUB_RUN_ID}" --dir "$RUNNER_TEMP/dx-maintain-response-artifacts"

      - name: Publish maintenance PR response
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DX_MAINTAIN_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DX_MAINTAIN_LABEL: ${{ needs.respond.outputs.label }}
          DX_MAINTAIN_BRANCH_PREFIX: ${{ needs.respond.outputs.branch_prefix }}
          DX_MAINTAIN_ALLOWED_CATEGORIES: ${{ needs.respond.outputs.allowed_categories }}
          DX_MAINTAIN_COPILOT_REVIEW: ${{ needs.respond.outputs.copilot_review }}
          DX_MAINTAIN_TRUSTED_CONFIG_REF: ${{ needs.respond.outputs.trusted_config_ref }}
          DX_MAINTAIN_REVIEWERS: ${{ needs.respond.outputs.reviewers }}
          HEAD_REF: ${{ needs.respond.outputs.head_ref }}
          HEAD_SHA: ${{ needs.respond.outputs.head_sha }}
          DX_MAINTAIN_EXPECTED_BRANCH: ${{ needs.respond.outputs.head_ref }}
          DX_MAINTAIN_EXPECTED_HEAD_SHA: ${{ needs.respond.outputs.head_sha }}
        run: |
          set -euo pipefail
          state_count=$(find "$RUNNER_TEMP/dx-maintain-response-artifacts" -name response-state.tsv -type f | wc -l | tr -d ' ')
          state_file="$RUNNER_TEMP/dx-maintain-response-artifacts/response-state.tsv"
          if [[ "$state_count" == "0" ]]; then
            echo "::notice::No deferred maintenance response publication state was produced."
            exit 0
          fi
          if [[ "$state_count" != "1" || ! -f "$state_file" ]]; then
            echo "::error::Unexpected deferred maintenance response state artifact layout."
            find "$RUNNER_TEMP/dx-maintain-response-artifacts" -name response-state.tsv -type f -print
            exit 1
          fi
          git checkout -B "$HEAD_REF" "$HEAD_SHA"
          bash "$DEX_DIR/bin/maintain.sh" publish-response --state-file "$state_file"
